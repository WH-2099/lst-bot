[project]
name = "lst"
version = "0.0.0"
description = "Local DST room control client for lst-bot."
license = "MIT"
requires-python = ">=3.14"
dependencies = [
    "logbook>=1.9.2",
    "pydantic>=2.13.4",
    "pystemd>=0.13.2",
]

[build-system]
requires = ["uv_build~=0.11"]
build-backend = "uv_build"
